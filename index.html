<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    #new-book-btn {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    #new-book-btn:hover {
      background-color: #0056b3;
    }

    #book-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .book-card {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .book-card h3 {
      margin-top: 0;
      color: #333;
    }

    .book-card p {
      margin: 10px 0;
      color: #666;
    }

    .book-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .book-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .toggle-read-btn {
      background-color: #28a745;
      color: white;
    }

    .toggle-read-btn:hover {
      background-color: #218838;
    }

    .remove-btn {
      background-color: #dc3545;
      color: white;
    }

    .remove-btn:hover {
      background-color: #c82333;
    }

    dialog {
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 500px;
    }

    dialog::backdrop {
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .submit-btn {
      background-color: #007bff;
      color: white;
    }

    .submit-btn:hover {
      background-color: #0056b3;
    }

    .cancel-btn {
      background-color: #6c757d;
      color: white;
    }

    .cancel-btn:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>
    <div class="header">
      <h1>My Library</h1>
      <button id="new-book-btn">+ New Book</button>
    </div>
    <div id="book-container"></div>

    <dialog id="book-form-dialog">
      <div class="modal-header">Add New Book</div>
      <form id="book-form">
        <div class="form-group">
          <label for="title">Title:</label>
          <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
          <label for="author">Author:</label>
          <input type="text" id="author" name="author" required>
        </div>
        <div class="form-group">
          <label for="pages">Number of Pages:</label>
          <input type="number" id="pages" name="pages" required>
        </div>
        <div class="form-group checkbox-group">
          <input type="checkbox" id="read" name="read">
          <label for="read">I have read this book</label>
        </div>
        <div class="modal-buttons">
          <button type="button" class="modal-btn cancel-btn" id="cancel-btn">Cancel</button>
          <button type="submit" class="modal-btn submit-btn">Add Book</button>
        </div>
      </form>
    </dialog>

  <script src="index.js"></script>
</body>
</html>
